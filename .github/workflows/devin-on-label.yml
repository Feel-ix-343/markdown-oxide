name: Trigger Devin on Issue Label

on:
  issues:
    types: [labeled]

jobs:
  trigger-devin:
    if: github.event.label.name == 'devin'
    runs-on: ubuntu-latest
    steps:
      - name: Create Devin session
        id: create-session
        run: |
          ISSUE_TITLE=$(jq -r '.issue.title // ""' "$GITHUB_EVENT_PATH")
          ISSUE_URL=$(jq -r '.issue.html_url // ""' "$GITHUB_EVENT_PATH")
          ISSUE_BODY=$(jq -r '.issue.body // ""' "$GITHUB_EVENT_PATH" | head -c 10000)

          PROMPT="Please read this GitHub issue and work on it: ${ISSUE_URL}

          Issue title: ${ISSUE_TITLE}

          Issue body:
          ${ISSUE_BODY}"

          PAYLOAD=$(jq -n --arg prompt "$PROMPT" --arg user_id "${{ secrets.DEVIN_USER_ID }}" \
            'if $user_id != "" then {prompt: $prompt, create_as_user_id: $user_id} else {prompt: $prompt} end')

          RESPONSE=$(curl -s -X POST "https://api.devin.ai/v3/organizations/${{ secrets.DEVIN_ORG_ID }}/sessions" \
            -H "Authorization: Bearer ${{ secrets.DEVIN_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")

          SESSION_URL=$(echo "$RESPONSE" | jq -r '.url // empty')
          SESSION_ID=$(echo "$RESPONSE" | jq -r '.session_id // empty')

          if [ -z "$SESSION_URL" ]; then
            echo "Error creating Devin session:"
            echo "$RESPONSE"
            exit 1
          fi

          echo "session_url=$SESSION_URL" >> "$GITHUB_OUTPUT"
          echo "session_id=$SESSION_ID" >> "$GITHUB_OUTPUT"

      - name: Comment on issue with session link
        uses: actions/github-script@v7
        env:
          SESSION_URL: ${{ steps.create-session.outputs.session_url }}
        with:
          script: |
            const sessionUrl = process.env.SESSION_URL;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `🤖 Devin session started for this issue!\n\n[View Devin session](${sessionUrl})`
            });
